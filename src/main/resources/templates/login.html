<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f4f6ff, #eef2ff); font-family: Inter, sans-serif; }
        .card { border: 0; border-radius: 24px; box-shadow: 0 20px 50px rgba(91, 75, 255, 0.15); }
        .btn-primary { background: #5B4BFF; border-color: #5B4BFF; }
        .btn-primary:hover { background: #4638d8; border-color: #4638d8; }
        .brand { color: #5B4BFF; font-weight: 700; }
    </style>
</head>
<body>
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100">
        <div class="col-lg-6 d-none d-lg-flex align-items-center">
            <div>
                <h1 class="display-5 fw-bold mb-3">Student Management System</h1>
                <p class="text-muted fs-5">Manage majors, student records, profiles, and reports in one elegant dashboard.</p>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card p-4 p-lg-5">
                <h2 class="brand mb-4">Welcome Back</h2>
                <p class="text-muted">Sign in to continue to your admin workspace.</p>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div th:if="${error}" class="alert alert-danger py-2">[[${error}]]</div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
