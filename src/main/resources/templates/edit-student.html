<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary:#5B4BFF; --bg:#f4f6ff; }
        body { background: var(--bg); }
        .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(160deg, #1f2144, #2f3272); color:white; }
        .sidebar .nav-link { color:#dcdcff; border-radius: 12px; margin-bottom: 6px; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background: rgba(255,255,255,0.16); color:white; }
        .main-content { flex:1; }
        .card { border:0; border-radius:20px; box-shadow:0 12px 30px rgba(0,0,0,.08); }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>
<div class="d-flex">
    <aside class="sidebar p-3 d-none d-lg-block">
        <h3 class="fw-bold mb-4">SMS</h3>
        <nav class="nav flex-column">
            <a class="nav-link" th:href="@{/dashboard}"><i class="fa-solid fa-gauge-high me-2"></i> Dashboard</a>
            <a class="nav-link active" th:href="@{/students}"><i class="fa-solid fa-users me-2"></i> Students</a>
            <a class="nav-link" th:href="@{/students/add}"><i class="fa-solid fa-user-plus me-2"></i> Add Student</a>
            <a class="nav-link" th:href="@{/departments}"><i class="fa-solid fa-building-columns me-2"></i> Departments</a>
            <a class="nav-link" th:href="@{/reports}"><i class="fa-solid fa-chart-pie me-2"></i> Reports</a>
            <a class="nav-link" th:href="@{/profile}"><i class="fa-solid fa-user me-2"></i> Profile</a>
            <a class="nav-link" th:href="@{/settings}"><i class="fa-solid fa-sliders me-2"></i> Settings</a>
            <a class="nav-link" th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</a>
        </nav>
    </aside>
    <main class="main-content p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold">Edit Student</h2>
                <p class="text-muted mb-0">Update existing student details.</p>
            </div>
            <a class="btn btn-outline-secondary" th:href="@{/students}">Back</a>
        </div>
        <div class="card p-4">
            <form th:action="@{/students/update/{id}(id=${student.id})}" th:object="${student}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" th:field="*{fullName}">
                        <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Register Number</label>
                        <input type="text" class="form-control" th:field="*{registerNumber}">
                        <div class="text-danger" th:if="${#fields.hasErrors('registerNumber')}" th:errors="*{registerNumber}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Department</label>
                        <select class="form-select" th:field="*{department}">
                            <option value="">Select department</option>
                            <option th:each="dept : ${departments}" th:value="${dept.departmentName}" th:text="${dept.departmentName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Course</label>
                        <input type="text" class="form-control" th:field="*{course}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Year</label>
                        <select class="form-select" th:field="*{year}">
                            <option value="">Select year</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" th:field="*{phone}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select" th:field="*{gender}">
                            <option value="">Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" rows="3" th:field="*{address}"></textarea>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">Update Student</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
