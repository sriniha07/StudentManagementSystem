<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary:#5B4BFF; --bg:#f4f6ff; }
        body { background: var(--bg); }
        .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(160deg, #1f2144, #2f3272); color:white; }
        .sidebar .nav-link { color:#dcdcff; border-radius: 12px; margin-bottom: 6px; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background: rgba(255,255,255,0.16); color:white; }
        .main-content { flex:1; }
        .card { border:0; border-radius:20px; box-shadow:0 12px 30px rgba(0,0,0,.08); }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>
<div class="d-flex">
    <aside class="sidebar p-3 d-none d-lg-block">
        <h3 class="fw-bold mb-4">SMS</h3>
        <nav class="nav flex-column">
            <a class="nav-link" th:href="@{/dashboard}"><i class="fa-solid fa-gauge-high me-2"></i> Dashboard</a>
            <a class="nav-link" th:href="@{/students}"><i class="fa-solid fa-users me-2"></i> Students</a>
            <a class="nav-link" th:href="@{/students/add}"><i class="fa-solid fa-user-plus me-2"></i> Add Student</a>
            <a class="nav-link active" th:href="@{/departments}"><i class="fa-solid fa-building-columns me-2"></i> Departments</a>
            <a class="nav-link" th:href="@{/reports}"><i class="fa-solid fa-chart-pie me-2"></i> Reports</a>
            <a class="nav-link" th:href="@{/profile}"><i class="fa-solid fa-user me-2"></i> Profile</a>
            <a class="nav-link" th:href="@{/settings}"><i class="fa-solid fa-sliders me-2"></i> Settings</a>
            <a class="nav-link" th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</a>
        </nav>
    </aside>
    <main class="main-content p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold">Departments</h2>
                <p class="text-muted mb-0">Manage departments and HOD details.</p>
            </div>
        </div>
        <div th:if="${successMessage}" class="alert alert-success">[[${successMessage}]]</div>
        <div class="card p-4 mb-4">
            <form th:action="@{/departments/save}" th:object="${department}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Department Name</label>
                    <input type="text" class="form-control" th:field="*{departmentName}">
                    <div class="text-danger" th:if="${#fields.hasErrors('departmentName')}" th:errors="*{departmentName}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">HOD Name</label>
                    <input type="text" class="form-control" th:field="*{hodName}">
                    <div class="text-danger" th:if="${#fields.hasErrors('hodName')}" th:errors="*{hodName}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Description</label>
                    <input type="text" class="form-control" th:field="*{description}">
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Save Department</button>
                </div>
            </form>
        </div>
        <div class="card p-4">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead><tr><th>Name</th><th>HOD</th><th>Description</th><th>Action</th></tr></thead>
                    <tbody>
                    <tr th:each="dept : ${departments}">
                        <td>[[${dept.departmentName}]]</td>
                        <td>[[${dept.hodName}]]</td>
                        <td>[[${dept.description}]]</td>
                        <td><a class="btn btn-sm btn-outline-danger" th:href="@{/departments/delete/{id}(id=${dept.id})}" onclick="return confirm('Delete this department?')"><i class="fa-solid fa-trash"></i></a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
